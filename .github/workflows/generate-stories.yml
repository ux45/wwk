name: Generate Stories

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Generate story pages
        run: node scripts/build.js

      - name: Commit generated pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add "story-*.html" "grownups.html" 2>/dev/null || true
          git commit -m "Auto-generated story pages" || echo "No changes to commit"
          git push || echo "No commits to push"
