<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>%%PAGE_TITLE%%</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles/site.css" />
    <style>
      .story-cover {
        max-width: 100%;
        height: auto;
        border-radius: 6px;
      }
      .play-bar {
        background: #f1f1f1;
        padding: 12px;
        border-radius: 8px;
      }
      .meta-row {
        gap: 0.75rem;
      }
    </style>
  </head>
  <body>
    <header class="bg-light py-3 mb-4">
      <div class="container">
        <h1 class="h4 mb-0">%%PAGE_TITLE%%</h1>
      </div>
    </header>

    <main class="container">
      <div class="row">
        <aside class="col-12 col-md-4">
          <img src="%%COVER_IMAGE%%" alt="cover" class="story-cover mb-3" />
          <div class="d-flex flex-column meta-row">
            <div><strong>By:</strong> %%AUTHOR%%</div>
            <div><strong>Duration:</strong> %%DURATION%%</div>
          </div>
          <div class="mt-3 play-bar" aria-label="player">%%PLAY_CONTROL%%</div>
        </aside>

        <section class="col-12 col-md-8">%%SECTIONS%%</section>
      </div>
    </main>

    <footer class="bg-dark text-white mt-5 py-4">
      <div class="container text-center">&copy; <span id="year"></span> Your Site</div>
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
